<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PLINTH — MIRAGE</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{--bg:#e9e4da;--ink:#17130e;--mut:#7a6f60;--acc:#b5642a}
  *{margin:0;box-sizing:border-box}
  html,body{height:100%;background:var(--bg);color:var(--ink);overflow:hidden;
    font-family:'IBM Plex Mono',ui-monospace,monospace}
  .card{position:absolute;inset:0;display:flex;flex-direction:column;
    align-items:center;justify-content:center;gap:2.4vmin;padding:4vmin 6vmin;text-align:center}
  .kick{font-size:clamp(.58rem,1.7vmin,.82rem);letter-spacing:.24em;text-transform:uppercase;color:var(--mut)}
  .art{flex:0 1 auto;min-height:0;display:flex;align-items:center;justify-content:center;width:100%}
  .art img{max-width:min(52vh,84%);max-height:50vh;object-fit:contain;
    filter:drop-shadow(0 24px 34px rgba(20,18,16,.16))}
  h1{font-family:'Instrument Serif',Georgia,serif;font-weight:400;
    font-size:clamp(1.35rem,5.2vmin,3rem);line-height:1.02;letter-spacing:.005em}
  .desc{font-size:clamp(.62rem,1.8vmin,.92rem);line-height:1.5;color:#3a332a;max-width:54ch}
  .spec{font-size:clamp(.56rem,1.5vmin,.78rem);letter-spacing:.08em;color:var(--mut)}
  .spec b{color:var(--acc);font-weight:400}
</style>
</head>
<body>
  <div class="card">
    <div class="kick">MIRAGE — All-in-one</div>
    <div class="art"><img src="plinth-mirage.svg" alt="MIRAGE — technical drawing"></div>
    <h1>The whole night, cast as one object.</h1>
    <p class="desc">Two sculpted towers, four cast woofers, a glossy deck bridging the base.
      Nothing to assemble — you plug in and play.</p>
    <div class="spec">Brushed steel · Edition of 5 · $290,000 · <b>No. 3 of 5 still unclaimed</b></div>
  </div>
</body>
</html>
